<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Interactvo Canvas</title>
    
    <link rel="icon" type="image/png" href="./assets/img/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark glass-component">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Juego de Burbujas Interactivas</span>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex flex-column justify-content-center">
        <div class="glass-component p-4 rounded-4">
            
            <div class="row mb-4 align-items-center">
                <div class="col-md-5">
                    <label for="level-slider" class="form-label text-white fw-bold">
                        Nivel: <span id="level-display" class="badge bg-light text-dark">1</span> 
                        <small class="fw-normal">(Burbujas: <span id="circle-count">10</span>)</small>
                    </label>
                    <input type="range" class="form-range" min="1" max="10" step="1" id="level-slider" value="1">
                </div>
                
                <div class="col-md-7">
                    <label class="form-label text-white fw-bold">
                        Eliminados: <span id="progress-text" class="fw-normal">0 / 10 (0%)</span>
                    </label>
                    <div class="progress" style="height: 25px; background-color: rgba(255,255,255,0.2);">
                        <div id="progress-bar" class="progress-bar bg-info progress-bar-striped progress-bar-animated text-dark fw-bold" 
                             role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                            0%
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="text-center overflow-auto">
                <canvas id="game-canvas" width="800" height="450" class="shadow-lg"></canvas>
            </div>

        </div>
    </main>

    <footer class="glass-component py-4 mt-auto">
        <div class="container text-center text-white">
            <div class="row">
                <div class="col-12 mb-2">
                    <p class="mb-0 fw-bold">Desarrollado por:</p>
                    <p class="lead mb-1">[Tu Nombre Completo Aquí]</p>
                </div>
            </div>
            <div class="row justify-content-center fs-7 opacity-75">
                <div class="col-auto">[Nombre de la Universidad]</div>
                <div class="col-auto">|</div>
                <div class="col-auto">[Semestre, e.g., 8vo Semestre]</div>
            </div>
            <hr class="border-white opacity-25 my-3">
            <div class="row justify-content-center fs-7">
                <div class="col-auto">
                    <strong>Correo:</strong> <a href="mailto:tu.correo@ejemplo.com" class="text-white text-decoration-none">[tu.correo@ejemplo.com]</a>
                </div>
                <div class="col-auto d-none d-md-block">|</div>
                <div class="col-auto">
                    <strong>Teléfono:</strong> <a href="tel:+527711234567" class="text-white text-decoration-none">[+52 771 123 4567]</a>
                </div>
            </div>
            <p class="mt-3 mb-0 small opacity-50">&copy; 2026 Pachuca, Hidalgo.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
