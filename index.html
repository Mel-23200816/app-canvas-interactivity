<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Interactvo Canvas</title>
    
    <link rel="icon" type="image/png" href="./assets/img/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="d-flex flex-column vh-100 overflow-hidden">
    
    <nav class="navbar navbar-dark glass-component py-2">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 fs-5">Juego de Burbujas Interactivas</span>
        </div>
    </nav>

    <main class="container-fluid px-4 py-3 flex-grow-1 d-flex flex-column" style="min-height: 0;">
        <div class="glass-component p-3 rounded-4 d-flex flex-column h-100">
            
            <div class="row mb-3 align-items-center">
                <div class="col-md-5">
                    <label for="level-slider" class="form-label text-white fw-bold mb-1">
                        Nivel Máximo: <span id="level-display" class="badge bg-light text-dark">1</span> 
                        <small class="fw-normal">(Burbujas Totales: <span id="circle-count">10</span>)</small>
                    </label>
                    <input type="range" class="form-range" min="1" max="10" step="1" id="level-slider" value="1">
                </div>
                
                <div class="col-md-7">
                    <label class="form-label text-white fw-bold mb-1">
                        Marcador General: <span id="progress-text" class="fw-normal">0 / 10 (0%)</span>
                    </label>
                    <div class="progress" style="height: 20px; background-color: rgba(255,255,255,0.2);">
                        <div id="progress-bar" class="progress-bar bg-info progress-bar-striped progress-bar-animated text-dark fw-bold" 
                             role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                            0%
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row flex-grow-1 overflow-hidden">
                <div class="col-lg-9 col-md-8 d-flex justify-content-center align-items-center h-100">
                    <canvas id="game-canvas" width="800" height="450" class="shadow-lg" style="max-width: 100%; max-height: 100%; width: auto; height: auto; border-radius: 12px;"></canvas>
                </div>
                
                <div class="col-lg-3 col-md-4 h-100 d-flex flex-column">
                    <div class="p-3 rounded-3 bg-dark bg-opacity-25 h-100 d-flex flex-column">
                        <h6 class="text-white border-bottom border-light pb-2 mb-2 text-center fw-bold">Estadísticas por Nivel</h6>
                        <div class="overflow-auto flex-grow-1 pe-2">
                            <ul id="level-stats-list" class="list-group list-group-flush bg-transparent">
                                </ul>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="glass-component py-2 mt-auto">
        <div class="container-fluid text-center text-white">
            <div class="row align-items-center justify-content-center">
                <div class="col-auto">
                    <p class="mb-0 fw-bold fs-6">Miguel Angel Cano Alejandro</p>
                    <p class="mb-0 fs-7 opacity-75">Instituto Tecnologico De Pachuca | 6to Semestre</p>
                </div>
            </div>
            <hr class="border-white opacity-25 my-1 mx-5">
            <div class="row justify-content-center fs-7">
                <div class="col-auto">
                    <strong>Correo:</strong> <a href="mailto:mcanoalejandro@gmail.com" class="text-white text-decoration-none">mcanoalejandro@gmail.com</a>
                </div>
                <div class="col-auto d-none d-md-block">|</div>
                <div class="col-auto">
                    <strong>Teléfono:</strong> <a href="tel:+527721486990" class="text-white text-decoration-none">+52 772 148 6990</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
